<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五运六气体质开方工具 v1.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh;padding:2rem 1rem}
.container{max-width:800px;margin:0 auto}
h1{font-size:22px;font-weight:600;color:#1a1a1a;margin-bottom:6px}
.subtitle{font-size:13px;color:#888;margin-bottom:2rem}
h3{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:12px}
.card{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:500px){.row{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:6px}
label{font-size:13px;color:#666;font-weight:500}
input[type=date],input[type=text]{width:100%;height:40px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;padding:0 12px;outline:none;transition:border 0.15s}
input[type=date]:focus,input[type=text]:focus{border-color:#6b7cff}
.diseases{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.disease-btn{font-size:13px;padding:6px 14px;border:1px solid #ddd;border-radius:20px;background:#f9f9f9;color:#444;cursor:pointer;transition:all 0.15s;user-select:none}
.disease-btn:hover{border-color:#6b7cff;color:#6b7cff}
.disease-btn.active{background:#6b7cff;color:#fff;border-color:#6b7cff}
.btn-primary{width:100%;height:44px;background:#6b7cff;border:none;border-radius:10px;font-size:15px;font-weight:600;color:#fff;cursor:pointer;margin-top:4px;transition:background 0.15s}
.btn-primary:hover{background:#5a6be8}
.result-card{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:1.25rem;margin-top:1rem;display:none}
.herb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px;margin-bottom:1rem}
.herb-item{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:#fafaf8;border:1px solid #eee;border-radius:8px;font-size:13px}
.herb-name{color:#1a1a1a;font-weight:600}
.herb-dose{color:#666;display:flex;align-items:center;gap:3px}
.herb-dose.range{color:#e07b00}
.herb-dose input{width:64px;height:28px;font-size:13px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#1a1a1a;padding:0 6px;text-align:right;outline:none}
.herb-dose input:focus{border-color:#6b7cff}
.info-section{margin-bottom:1rem}
.info-label{font-size:12px;color:#888;font-weight:500;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.info-value{font-size:13px;color:#1a1a1a;padding:10px 14px;background:#fafaf8;border-radius:8px;border:1px solid #eee;line-height:1.8}
.tag{display:inline-block;font-size:12px;padding:3px 9px;border-radius:12px;margin:2px;background:#eef0ff;color:#5a6be8;font-weight:500}
.tag.warn{background:#fff5e6;color:#c07000}
.tag.green{background:#e6f7ee;color:#2a7a4a}
.divider{border:none;border-top:1px solid #eee;margin:1rem 0}
.note{font-size:12px;color:#888;margin-top:12px;line-height:1.8;padding:10px 14px;background:#fafaf8;border-radius:8px;border:1px solid #eee}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.copy-btn{font-size:13px;padding:6px 14px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#666;cursor:pointer;transition:all 0.15s}
.copy-btn:hover{border-color:#6b7cff;color:#6b7cff}
.section-title{font-size:13px;font-weight:600;color:#666;margin-bottom:10px;margin-top:1.25rem}
.disclaimer{font-size:12px;color:#aaa;text-align:center;margin-top:2rem;line-height:1.7;padding:0 1rem}
/* Password screen */
#pwScreen{position:fixed;inset:0;background:#f5f4f0;display:flex;align-items:center;justify-content:center;z-index:9999}
#pwBox{background:#fff;border:1px solid #e8e6e0;border-radius:16px;padding:2.5rem 2rem;width:320px;max-width:90vw;text-align:center}
#pwBox h2{font-size:18px;font-weight:600;color:#1a1a1a;margin-bottom:6px}
#pwBox p{font-size:13px;color:#888;margin-bottom:1.5rem}
#pwInput{width:100%;height:44px;border:1px solid #ddd;border-radius:8px;font-size:15px;padding:0 14px;outline:none;text-align:center;letter-spacing:2px;transition:border 0.15s;margin-bottom:10px}
#pwInput:focus{border-color:#6b7cff}
#pwInput.error{border-color:#e05555;animation:shake 0.3s}
#pwBtn{width:100%;height:44px;background:#6b7cff;border:none;border-radius:10px;font-size:15px;font-weight:600;color:#fff;cursor:pointer}
#pwBtn:hover{background:#5a6be8}
#pwErr{font-size:13px;color:#e05555;margin-top:8px;min-height:18px}
#pwLock{font-size:36px;margin-bottom:1rem}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body>

<div id="pwScreen">
  <div id="pwBox">
    <div id="pwLock">🔒</div>
    <h2>五运六气开方工具</h2>
    <p>请输入访问密码</p>
    <input type="password" id="pwInput" placeholder="输入密码" onkeydown="if(event.key==='Enter')checkPw()">
    <button id="pwBtn" onclick="checkPw()">进入</button>
    <div id="pwErr"></div>
  </div>
</div>

<div class="container">
  <h1>五运六气体质开方工具 v1.0</h1>
  <p class="subtitle">根据患者出生日期推算先天禀赋，结合就诊时运气，自动生成参考方剂</p>

  <div class="card">
    <h3>患者信息</h3>
    <div class="row">
      <div class="field">
        <label>患者出生日期</label>
        <input type="date" id="birthDate">
      </div>
      <div class="field">
        <label>就诊日期</label>
        <input type="date" id="visitDate">
      </div>
    </div>
    <div class="field" style="margin-bottom:16px">
      <label>患者姓名（可选）</label>
      <input type="text" id="patientName" placeholder="姓名">
    </div>
    <h3>病种选择（可多选）</h3>
    <div class="diseases" id="diseaseList"></div>
  </div>

  <button class="btn-primary" onclick="calculate()">生成方剂</button>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <h3 id="resultTitle">方剂结果</h3>
      <div style="display:flex;gap:8px">
        <button class="copy-btn" onclick="copyHerbs()">复制方剂</button>
        <button class="copy-btn" onclick="copyRecord()">复制病案档案</button>
      </div>
    </div>
    <hr class="divider">

    <div class="info-section">
      <div class="info-label">先天禀赋（母体内10个月）</div>
      <div class="info-value" id="bingfu"></div>
    </div>

    <div class="info-section">
      <div class="info-label">就诊时运气</div>
      <div class="info-value" id="visitYunqi"></div>
    </div>

    <div class="section-title">完整方剂</div>
    <div class="herb-grid" id="herbGrid"></div>

    <div class="note" id="resultNote"></div>
  </div>

  <p class="disclaimer">本工具仅供执业中医师参考使用，最终方剂由医师根据临床实际情况判断确定。<br>有剂量范围的药物请医师根据患者具体情况填写实际用量。</p>
</div>

<script>
// Password check - hash stored, not plaintext
const PW_HASH = '7a3f8b2e1c9d4f6a0e5b7c8d2f1a9e3b';

function simpleHash(str) {
  let h = 0x12345678;
  for(let i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 0x9e3779b9);
    h ^= h >>> 16;
  }
  return (h >>> 0).toString(16).padStart(8, '0');
}

// Actual password hash (Wj9#mK4@Lx2$Pq7)
const CORRECT = '748521eb';

function checkPw() {
  const val = document.getElementById('pwInput').value;
  const h = simpleHash(val);
  if(h === CORRECT) {
    document.getElementById('pwScreen').style.display = 'none';
    sessionStorage.setItem('tcm_auth', '1');
  } else {
    const inp = document.getElementById('pwInput');

    document.getElementById('pwErr').textContent = '密码错误，请重试';
    setTimeout(()=>inp.classList.remove('error'), 400);
    inp.value = '';
  }
}

  document.getElementById('pwScreen').style.display = 'none';
}
